services:
  - type: web
    name: hotel-lobby
    env: go
    buildCommand: cd frontend && bun install && bun run build && mkdir -p ../backend/cmd/server/static && cp -r build/* ../backend/cmd/server/static/ && cd ../backend && go build -o ../build/server ./cmd/server
    startCommand: ./build/server
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 168h
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: CROSSMINT_API_KEY
        sync: false
      - key: CROSSMINT_PROJECT_ID
        sync: false
      - key: CROSSMINT_WEBHOOK_SECRET
        sync: false
      - key: CROSSMINT_ENV
        value: staging
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: Hotel Lobby <noreply@hotellobby.com>
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://your-production-domain.com
