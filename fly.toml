# fly.toml app configuration file generated for hotelobby on 2026-07-15T16:13:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hotelobby'
primary_region = 'iad'

[build]

[env]
  APP_ENV = 'production'
  APP_URL = 'https://hotelobby.fly.dev'
  CORS_ORIGINS = 'https://hotelobby.fly.dev'
  CROSSMINT_ENV = 'staging'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
