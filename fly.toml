app = "hotelobby"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  APP_ENV = "production"
  APP_URL = "https://hotelobby.fly.dev"
  CORS_ORIGINS = "https://hotelobby.fly.dev"
  CROSSMINT_ENV = "staging"
  PORT = "8000"
